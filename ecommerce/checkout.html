<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - StepUp Store</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/checkout.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  </head>
  <body>

    <!-- HEADER -->
    <header>
      <div class="header-inner">
        <a class="logo" href="index.html" style="text-decoration:none; color:white;">
          <span class="logo-icon">👟</span>
          <span class="logo-text">StepUp</span>
        </a>
      </div>
    </header>

    <!-- CHECKOUT -->
    <main class="checkout-main">

      <!-- FORM -->
      <div class="checkout-form-wrap">
        <h2 class="checkout-title"><i class="fas fa-map-marker-alt"></i> Informasi Pengiriman</h2>

        <div class="form-group">
          <label>Nama Lengkap</label>
          <input type="text" id="nama" placeholder="Masukkan nama lengkap" />
        </div>

        <div class="form-group">
          <label>Nomor HP</label>
          <input type="text" id="hp" placeholder="08xxxxxxxxxx" />
        </div>

        <div class="form-group">
          <label>Alamat</label>
          <textarea id="alamat" placeholder="Jalan, RT/RW, Kelurahan, Kecamatan"></textarea>
        </div>

        <div class="form-group">
          <label>Kota</label>
          <input type="text" id="kota" placeholder="Nama kota" />
        </div>

        <div class="form-group">
          <label>Kode Pos</label>
          <input type="text" id="kodepos" placeholder="Contoh: 12345" />
        </div>

        <h2 class="checkout-title" style="margin-top:32px">
          <i class="fas fa-credit-card"></i> Metode Pembayaran
        </h2>

        <div class="payment-options">
          <label class="payment-option">
            <input type="radio" name="payment" value="transfer" checked />
            <div class="payment-box">
              <i class="fas fa-university"></i>
              <span>Transfer Bank</span>
            </div>
          </label>
          <label class="payment-option">
            <input type="radio" name="payment" value="cod" />
            <div class="payment-box">
              <i class="fas fa-money-bill-wave"></i>
              <span>COD</span>
            </div>
          </label>
          <label class="payment-option">
            <input type="radio" name="payment" value="ewallet" />
            <div class="payment-box">
              <i class="fas fa-wallet"></i>
              <span>E-Wallet</span>
            </div>
          </label>
        </div>
      </div>

      <!-- ORDER SUMMARY -->
      <div class="order-summary">
        <h2 class="checkout-title"><i class="fas fa-shopping-bag"></i> Ringkasan Pesanan</h2>
        <div class="order-items" id="orderItems"></div>

        <!-- PROMO -->
        <div class="promo-wrap">
          <input type="text" id="promoInput" placeholder="Kode promo..." />
          <button id="promoBtn">Pakai</button>
        </div>
        <p id="promoMsg" style="font-size:0.8rem; margin-bottom:8px;"></p>

        <div class="order-total-row">
          <span>Subtotal</span>
          <strong id="orderSubtotal">Rp 0</strong>
        </div>
        <div class="order-total-row" id="discountRow" style="display:none;">
          <span>Diskon</span>
          <strong id="orderDiscount" style="color:green;"></strong>
        </div>
        <div class="order-total-row">
          <span>Ongkir</span>
          <strong>Rp 15.000</strong>
        </div>
        <div class="order-total-row grand">
          <span>Total</span>
          <strong id="orderTotal">Rp 0</strong>
        </div>

        <button class="place-order-btn" id="placeOrderBtn">
          <i class="fas fa-check-circle"></i> Buat Pesanan
        </button>
        <a href="index.html" class="back-btn">
          <i class="fas fa-arrow-left"></i> Kembali Belanja
        </a>
      </div>

    </main>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script src="js/checkout.js"></script>
  </body>
</html>
